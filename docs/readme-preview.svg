<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Bank Customer Churn Prediction Pipeline</title>
  <desc id="desc">A visual overview of the machine learning workflow from customer data to churn risk output.</desc>
  <rect width="1200" height="620" rx="32" fill="#f7fbff"/>
  <circle cx="1040" cy="95" r="150" fill="#dbeafe"/>
  <circle cx="120" cy="520" r="150" fill="#dcfce7"/>
  <text x="70" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#172033">Bank Customer Churn Prediction</text>
  <text x="70" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#52616b">Feature engineering, model comparison, threshold tuning, and saved predictions.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(70 220)">
      <rect width="190" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="24" y="45" font-size="24" font-weight="700" fill="#172033">Customer Data</text>
      <text x="24" y="82" font-size="18" fill="#52616b">Credit score</text>
      <text x="24" y="108" font-size="18" fill="#52616b">Age, balance</text>
      <text x="24" y="134" font-size="18" fill="#52616b">Activity signals</text>
    </g>
    <path d="M280 295 H365" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M348 275 L370 295 L348 315" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(390 220)">
      <rect width="210" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="24" y="45" font-size="24" font-weight="700" fill="#172033">Features</text>
      <text x="24" y="82" font-size="18" fill="#52616b">Ratios</text>
      <text x="24" y="108" font-size="18" fill="#52616b">Age groups</text>
      <text x="24" y="134" font-size="18" fill="#52616b">Encoded categories</text>
    </g>
    <path d="M625 295 H710" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M693 275 L715 295 L693 315" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(735 220)">
      <rect width="190" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="24" y="45" font-size="24" font-weight="700" fill="#172033">Models</text>
      <text x="24" y="82" font-size="18" fill="#52616b">Random Forest</text>
      <text x="24" y="108" font-size="18" fill="#52616b">Gradient Boosting</text>
      <text x="24" y="134" font-size="18" fill="#52616b">XGBoost / LGBM</text>
    </g>
    <path d="M950 295 H1035" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <path d="M1018 275 L1040 295 L1018 315" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(70 420)">
      <rect width="1060" height="92" rx="18" fill="#172033"/>
      <text x="32" y="38" font-size="24" font-weight="700" fill="#ffffff">Output</text>
      <text x="32" y="68" font-size="19" fill="#cbd5e1">Best model, leaderboard CSV, test predictions, churn probability, and single-customer prediction helper.</text>
    </g>
  </g>
</svg>

